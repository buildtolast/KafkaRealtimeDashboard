name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies for librdkafka
      run: sudo apt-get update && sudo apt-get install -y librdkafka-dev pkg-config cmake
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
