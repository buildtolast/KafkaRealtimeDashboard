# Dashboard Only — Connect to an external Kafka cluster
#
# Usage:
#   docker compose up -d
#
# Override Kafka broker address:
#   KAFKA_BROKERS=my-kafka-cluster:9092 docker compose up -d
#
# Or create a .env file:
#   echo "KAFKA_BROKERS=my-kafka-cluster:9092" > .env
#   docker compose up -d
#
# Dashboard: http://localhost:3001
# You can also change the broker at runtime via the UI header.

services:
  dashboard:
    build: .
    container_name: kafka-dashboard-app
    ports:
      - "3001:3001"
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-localhost:9092}
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3001"
      STATIC_DIR: ./static
      RUST_LOG: info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
