# Dashboard Only — Connect to an external Kafka cluster
#
# Usage:
#   docker compose up -d
#
# Point to your Kafka cluster (another machine, remote, cloud, etc.):
#   KAFKA_BROKERS=192.168.1.50:9092 docker compose up -d
#
# Or use a .env file for persistent config:
#   echo "KAFKA_BROKERS=192.168.1.50:9092" > .env
#   docker compose up -d
#
# Multiple brokers:
#   KAFKA_BROKERS=broker1:9092,broker2:9092,broker3:9092 docker compose up -d
#
# Dashboard: http://localhost:3001
# You can also change the broker at runtime via the UI header.

services:
  dashboard:
    build: .
    container_name: kafka-dashboard-app
    ports:
      - "3001:3001"
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-localhost:9092}
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3001"
      STATIC_DIR: ./static
      RUST_LOG: info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
