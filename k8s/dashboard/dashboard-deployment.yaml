apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: kafka-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for Kafka to be ready..."
          until nc -z kafka 9092; do
            echo "Kafka not ready yet, waiting..."
            sleep 2
          done
          echo "Kafka is ready!"
      containers:
      - name: dashboard
        image: kafka-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - configMapRef:
            name: dashboard-config
        readinessProbe:
          httpGet:
            path: /api/topics
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/broker
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
