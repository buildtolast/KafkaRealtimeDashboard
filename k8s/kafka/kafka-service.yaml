apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kafka-dashboard
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
  - name: plaintext
    port: 9092
    targetPort: 9092
  - name: external
    port: 9094
    targetPort: 9094
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: kafka-dashboard
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
  - name: external
    port: 9094
    targetPort: 9094
    nodePort: 30094
